<style>
:root{
  --bg:#f7f3ec;--text:#2c2416;--text2:#5a4e3a;--text-muted:#6B5B4B;
  --accent:#8b5e3c;--accentL:#c4956a;--accent-red:#8B2500;
  --gold:#b8860b;--goldL:#d4a84b;--gold-light:#C9A84C;
  --border:#d4c4a8;--border-light:#EDE8E0;--card:#fffdf7;
  --verseBg:#f0e8d8;--verseBd:#c4956a;
  --sbW:92px;--sbBg:#1e1a14;--sbText:#d4c4a8;
  --headGrad:linear-gradient(135deg,#2a2218 0%,#3d3225 50%,#2a2218 100%);
  --r:8px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{scrollbar-width:none;-ms-overflow-style:none;
  -webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;
  -webkit-touch-callout:none;}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;width:0;height:0;}
body{font-family:"Noto Serif TC","Source Han Serif TC","Songti TC",Georgia,serif;
  background:var(--bg);color:var(--text);line-height:1.8;font-size:20px;
  -webkit-text-size-adjust:100%;}

/* ───── 側欄 ───── */
#sb{position:fixed;left:0;top:0;width:var(--sbW);height:100vh;
  background:var(--sbBg);color:var(--sbText);z-index:100;
  display:flex;flex-direction:column;align-items:center;
  padding:0 0 16px;overflow-y:auto;scrollbar-width:none;}
#sb::-webkit-scrollbar{display:none;}
.sb-brand{position:sticky;top:0;width:100%;
  font-family:"Noto Sans TC",sans-serif;text-align:center;line-height:1.5;
  background:linear-gradient(to bottom,var(--sbBg) 78%,rgba(30,26,20,0));
  padding:14px 4px 12px;margin-bottom:6px;z-index:5;
  text-decoration:none;cursor:pointer;transition:color .25s;display:block;
  border-bottom:1px solid rgba(184,134,11,.25);}
.sb-brand:hover{color:var(--goldL);}
.sb-brand .sb-brand-line1{display:block;font-size:11px;letter-spacing:1.5px;color:var(--gold);opacity:.78;}
.sb-brand .sb-brand-line2{display:block;font-size:13px;font-weight:700;letter-spacing:2.2px;color:var(--goldL);margin-top:2px;}
.sb-brand .sb-brand-arrow{display:block;font-size:10px;color:var(--gold);opacity:.55;margin-top:2px;}
.sb-nav{display:flex;flex-direction:column;gap:6px;width:100%;align-items:center;margin-top:6px;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:3px;
  width:100%;padding:6px 4px;text-decoration:none;color:var(--sbText);
  cursor:pointer;transition:background .2s,color .2s;border-radius:8px;}
.sb-item:hover{background:rgba(184,134,11,.16);}
.sb-item.active{background:rgba(184,134,11,.28);box-shadow:0 0 14px rgba(184,134,11,.35);}
.sb-circle{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  border:1.5px solid var(--gold);color:var(--goldL);font-family:"Noto Sans TC",sans-serif;
  font-size:16px;font-weight:600;}
.sb-item.active .sb-circle{background:var(--gold);color:#1e1a14;}
.sb-label{font-size:12px;letter-spacing:.5px;text-align:center;opacity:.86;}

/* ───── 主區 ───── */
.main{margin-left:var(--sbW);}
.site-hero{position:relative;overflow:hidden;
  background:radial-gradient(ellipse at 50% 0%,#3d3225 0%,#241d14 70%);
  color:#f7f3ec;text-align:center;padding:72px 24px 60px;}
.site-hero::before{content:"般若";position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);font-size:260px;font-weight:900;
  color:rgba(212,168,75,.04);white-space:nowrap;pointer-events:none;}
.hero-inner{position:relative;z-index:2;max-width:880px;margin:0 auto;}
.hero-vol{font-family:"Noto Sans TC",sans-serif;font-size:18px;letter-spacing:6px;color:var(--goldL);margin-bottom:18px;}
.hero-title{font-size:56px;font-weight:900;color:#f3e7c8;letter-spacing:3px;line-height:1.3;}
.hero-subtitle{font-size:20px;color:#d8c9a8;margin-top:18px;letter-spacing:1px;line-height:1.7;}
.hero-meta{font-family:"Noto Sans TC",sans-serif;font-size:15px;color:#b8a585;margin-top:26px;letter-spacing:1px;}
.hero-range{display:inline-block;margin-top:22px;padding:8px 22px;border:1px solid rgba(184,134,11,.5);
  border-radius:30px;font-family:"Noto Sans TC",sans-serif;font-size:14px;color:var(--goldL);letter-spacing:2px;}

/* ───── 編者前言 ───── */
.preface{max-width:880px;margin:46px auto 0;padding:0 28px;}
.preface-title{text-align:center;font-size:30px;color:var(--accent);font-weight:700;letter-spacing:4px;margin-bottom:26px;}
.preface-title::after{content:"";display:block;width:60px;height:2px;background:var(--gold);margin:14px auto 0;}
.preface p{font-size:19px;line-height:2.1;color:var(--text2);margin-bottom:18px;text-align:justify;}

/* ───── 總目錄 ───── */
.toc-section{max-width:1100px;margin:54px auto 0;padding:0 28px;}
.toc-title{text-align:center;font-size:34px;color:var(--accent);font-weight:700;letter-spacing:8px;}
.toc-title::after{content:"";display:block;width:70px;height:2px;background:var(--gold);margin:16px auto 0;}
.toc-desc{text-align:center;font-family:"Noto Sans TC",sans-serif;font-size:17px;color:var(--text-muted);margin:18px 0 32px;letter-spacing:2px;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:22px;}
.toc-card{display:flex;gap:18px;align-items:flex-start;background:var(--card);
  border:1px solid var(--border);border-radius:12px;padding:22px 24px;
  text-decoration:none;color:inherit;box-shadow:0 2px 8px rgba(91,58,41,.06);
  transition:transform .2s,box-shadow .2s,border-color .2s;}
.toc-card:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(91,58,41,.14);border-color:var(--gold);}
.toc-num{flex-shrink:0;width:46px;height:46px;border-radius:50%;background:var(--headGrad);
  color:var(--goldL);display:flex;align-items:center;justify-content:center;
  font-family:"Noto Sans TC",sans-serif;font-size:20px;font-weight:700;}
.toc-body{flex:1;}
.toc-name{font-size:21px;font-weight:700;color:var(--accent);line-height:1.5;}
.toc-card-sub{font-family:"Noto Sans TC",sans-serif;font-size:14.5px;color:var(--text-muted);margin-top:8px;line-height:1.7;letter-spacing:.5px;}

/* ───── 章節（品）區 ───── */
.chapter{max-width:1180px;margin:64px auto 0;padding:0 24px;}
.ch-head{background:var(--headGrad);color:#f3e7c8;text-align:center;
  padding:42px 26px 36px;border-radius:14px 14px 0 0;position:relative;}
.ch-head::after{content:"";display:block;width:64px;height:2px;background:var(--gold);margin:18px auto 0;}
.ch-num{font-family:"Noto Sans TC",sans-serif;font-size:18px;letter-spacing:4px;color:var(--goldL);margin-bottom:14px;}
.ch-name{font-size:36px;font-weight:900;letter-spacing:2px;line-height:1.3;}
.ch-sub{font-family:"Noto Sans TC",sans-serif;font-size:16px;color:#c9b893;margin-top:16px;letter-spacing:1px;line-height:1.6;}
.ch-body{background:#fff;border:1px solid var(--border);border-top:0;
  border-radius:0 0 14px 14px;padding:34px 30px 30px;}

/* ───── 橋接 ───── */
.bridge{background:linear-gradient(135deg,#fffdf5,#f5ecd8);border:1px solid var(--border);
  border-left:5px solid var(--gold);border-radius:10px;padding:18px 24px;margin:0 0 26px;
  box-shadow:0 2px 10px rgba(91,58,41,.06);}
.bridge-outro{border-left-color:var(--accentL);background:linear-gradient(135deg,#fdf8e8,#f2e6c8);margin:30px 0 14px;}
.bridge-label{display:inline-block;font-family:"Noto Sans TC",sans-serif;font-size:12.5px;
  background:var(--gold);color:#fff;padding:3px 12px;border-radius:12px;letter-spacing:2.2px;margin-bottom:10px;}
.bridge-outro .bridge-label{background:var(--accent);}
.bridge p{margin:0;color:var(--text2);line-height:2.1;font-size:18.5px;text-align:justify;}

/* ───── iframe ───── */
.ch-frame{display:block;width:100%;border:1px solid var(--border);background:#fffdf7;
  border-radius:12px;box-shadow:0 4px 20px rgba(91,58,41,.1);margin:0 0 8px;min-height:180px;}
.next-link{display:inline-block;margin-top:6px;font-family:"Noto Sans TC",sans-serif;font-size:17px;
  color:var(--accent);text-decoration:none;border-bottom:1px dashed var(--accentL);padding-bottom:2px;transition:color .2s;}
.next-link:hover{color:var(--gold);}

/* ───── 頁尾 ───── */
.site-footer{margin-top:70px;padding:40px 24px;text-align:center;
  background:var(--headGrad);color:#c9b893;font-size:15px;letter-spacing:1px;line-height:1.9;}
.site-footer .ft-title{color:var(--goldL);font-family:"Noto Sans TC",sans-serif;letter-spacing:3px;margin-bottom:8px;}

/* ───── 底部進度膠囊 ───── */
.read-progress{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:120;
  background:rgba(30,26,20,.92);color:var(--gold);padding:9px 24px;border-radius:30px;
  border:1px solid rgba(184,134,11,.5);box-shadow:0 4px 18px rgba(0,0,0,.25);
  font-family:"Noto Sans TC",sans-serif;font-size:14px;letter-spacing:2px;
  display:flex;align-items:center;gap:12px;pointer-events:none;user-select:none;
  backdrop-filter:blur(6px);transition:opacity .45s ease,transform .45s ease;}
.read-progress.hide-near-end{opacity:0;transform:translateX(-50%) translateY(28px);}
.read-progress .rp-label{font-size:13px;opacity:.85;letter-spacing:4px;color:var(--goldL);}
.read-progress .rp-bar{width:148px;height:4px;background:rgba(212,196,168,.18);border-radius:2px;overflow:hidden;position:relative;}
.read-progress .rp-fill{position:absolute;top:0;left:0;bottom:0;background:linear-gradient(90deg,var(--gold),var(--goldL));width:0%;transition:width .3s;}
.read-progress .rp-pct{font-weight:600;min-width:38px;text-align:right;font-size:13px;}

/* ───── 回頂 ───── */
#backTop{position:fixed;right:22px;bottom:22px;width:44px;height:44px;border-radius:50%;
  background:var(--headGrad);color:var(--goldL);border:1px solid rgba(184,134,11,.5);
  font-size:18px;cursor:pointer;z-index:120;opacity:0;pointer-events:none;transition:opacity .3s;}
#backTop.show{opacity:1;pointer-events:auto;}
#sbToggle{display:none;}

/* ───── RWD ───── */
@media(max-width:900px){
  #sb{transform:translateX(-100%);transition:transform .3s;}
  #sb.open{transform:translateX(0);}
  .main{margin-left:0;}
  #sbToggle{display:flex;position:fixed;left:14px;top:14px;z-index:130;
    width:42px;height:42px;border-radius:8px;background:var(--sbBg);color:var(--goldL);
    border:1px solid rgba(184,134,11,.4);align-items:center;justify-content:center;font-size:20px;cursor:pointer;}
  .hero-title{font-size:38px;}.ch-name{font-size:28px;}
  .site-hero{padding:84px 18px 48px;}
}
@media(max-width:600px){
  body{font-size:17px;}.hero-title{font-size:32px;}.toc-title{font-size:26px;}
}

<script>
var rpFill=document.getElementById('rpFill'),rpPct=document.getElementById('rpPct');
function updateProgress(){var sh=document.documentElement.scrollHeight-window.innerHeight;
  var pct=sh>0?Math.min(100,Math.max(0,window.scrollY/sh*100)):0;
  if(rpFill)rpFill.style.width=pct+'%';if(rpPct)rpPct.textContent=Math.round(pct)+'%';}
window.addEventListener('scroll',updateProgress,{passive:true});updateProgress();

var sbBrand=document.getElementById('sbBrand');
if(sbBrand)sbBrand.addEventListener('click',function(e){e.preventDefault();window.scrollTo({top:0,behavior:'smooth'});});

var backTop=document.getElementById('backTop');
window.addEventListener('scroll',function(){if(window.scrollY>600)backTop.classList.add('show');else backTop.classList.remove('show');},{passive:true});
backTop.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});

var sbToggle=document.getElementById('sbToggle'),sb=document.getElementById('sb');
sbToggle.addEventListener('click',function(){sb.classList.toggle('open');});

/* iframe 自動高度 */
function resizeFrame(f){try{var d=f.contentDocument||f.contentWindow.document;
  if(!d||!d.body)return;d.body.style.minHeight='0';d.body.style.height='auto';
  if(d.documentElement){d.documentElement.style.minHeight='0';d.documentElement.style.height='auto';}
  var h=d.body.scrollHeight;if(h>100){f.style.height=h+'px';f.style.minHeight='0';}}catch(e){}}
function resizeAllFrames(){document.querySelectorAll('iframe.ch-frame').forEach(resizeFrame);
  if(typeof updateProgress==='function')updateProgress();}
function setupFrame(f){var tries=0;function tick(){tries++;resizeFrame(f);if(tries<30)setTimeout(tick,200);}
  if(f.contentDocument&&f.contentDocument.readyState==='complete')tick();else f.addEventListener('load',tick);}
document.querySelectorAll('iframe.ch-frame').forEach(setupFrame);
var rzT;window.addEventListener('resize',function(){clearTimeout(rzT);rzT=setTimeout(resizeAllFrames,200);});

/* 錨點防錯跳 */
document.addEventListener('click',function(e){var a=e.target;while(a&&a.tagName!=='A')a=a.parentElement;
  if(!a)return;var h=a.getAttribute('href');if(!h||h.charAt(0)!=='#'||h.length<2)return;
  var el=document.getElementById(h.substring(1));if(!el)return;e.preventDefault();
  resizeAllFrames();setTimeout(function(){resizeAllFrames();
    var rect=el.getBoundingClientRect();window.scrollTo({top:window.scrollY+rect.top-20,behavior:'smooth'});},60);},true);

/* 側欄高亮 */
var sections=document.querySelectorAll('section.chapter'),sbItems=document.querySelectorAll('.sb-item');
function highlight(){var idx=-1;sections.forEach(function(s,i){if(s.getBoundingClientRect().top<window.innerHeight*0.35)idx=i;});
  sbItems.forEach(function(it,i){it.classList.toggle('active',i===idx);});}
window.addEventListener('scroll',highlight,{passive:true});highlight();

/* 持續輪詢 */
var _rt=0,_riv=setInterval(function(){_rt++;resizeAllFrames();if(_rt>50)clearInterval(_riv);},300);

/* 接近頁尾淡出 */
(function(){var cap=document.getElementById('readProgress');if(!cap)return;
  function setHide(on){cap.classList.toggle('hide-near-end',!!on);}
  var t=document.querySelector('.site-footer');if(!t)return;
  if('IntersectionObserver' in window){var io=new IntersectionObserver(function(es){
    setHide(es.some(function(e){return e.isIntersecting;}));},{rootMargin:'0px 0px -20px 0px',threshold:0.01});io.observe(t);}
  else{window.addEventListener('scroll',function(){var dh=document.documentElement.scrollHeight;
    setHide(dh-(window.scrollY+window.innerHeight)<240);},{passive:true});}})();

/* 外層防複製 */
(function(){var blk=function(e){e.preventDefault();return false;};
['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){document.addEventListener(ev,blk,true);});
document.addEventListener('keydown',function(e){var k=e.key;
  if(e.ctrlKey&&(k==='c'||k==='C'||k==='a'||k==='A'||k==='s'||k==='S'||k==='p'||k==='P'||k==='u'||k==='U')){blk(e);}
  if(k==='F12')blk(e);if(e.ctrlKey&&e.shiftKey&&(k==='I'||k==='J'||k==='C'||k==='K')){blk(e);}},true);})();
</script>

<script id="wy-print-intercept">
(function(){
  try{ window.print = function(){}; }catch(e){}
  document.addEventListener("keydown", function(e){
    if((e.metaKey||e.ctrlKey) && (e.key==="p"||e.key==="P"||e.keyCode===80)){
      e.preventDefault(); e.stopPropagation();
      return false;
    }
  }, true);
})();

<script id="wy-decoder">
(function(){
  if(!window.__wyReady) return;
  var KEY = "wy-dazhidulun-83-v1";
  function _dec(b64){
    try{
      var raw = atob(b64);
      var bytes = new Uint8Array(raw.length);
      for(var i=0;i<raw.length;i++){
        bytes[i] = (raw.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length)) & 0xff;
      }
      if(typeof TextDecoder !== "undefined"){
        return new TextDecoder("utf-8").decode(bytes);
      }
      var s = "";
      for(var j=0;j<bytes.length;j++) s += String.fromCharCode(bytes[j]);
      return decodeURIComponent(escape(s));
    }catch(e){ return null; }
  }
  window.__wyReady.then(function(ok){
    if(!ok) return;
    document.querySelectorAll("iframe.ch-frame[data-c]").forEach(function(oldF){
      var decoded = _dec(oldF.getAttribute("data-c"));
      if(!decoded) return;
      var newF = document.createElement("iframe");
      for(var i=0;i<oldF.attributes.length;i++){
        var a = oldF.attributes[i];
        if(a.name === "data-c" || a.name === "srcdoc") continue;
        try{ newF.setAttribute(a.name, a.value); }catch(e){}
      }
      newF.setAttribute("srcdoc", decoded);
      try{ oldF.parentNode.replaceChild(newF, oldF); }catch(e){ return; }
      if(typeof window.setupFrame === "function"){
        try{ window.setupFrame(newF); }catch(e){}
      }
    });
    document.querySelectorAll("[data-wytext]").forEach(function(el){
      var t = _dec(el.getAttribute("data-wytext"));
      if(t === null) return;
      el.innerHTML = t;
      el.removeAttribute("data-wytext");
    });
    if(typeof window.resizeAllFrames === "function"){
      [150, 800, 2000].forEach(function(ms){
        setTimeout(function(){ try{ window.resizeAllFrames(); }catch(e){} }, ms);
      });
    }
  });
})();
</script>
